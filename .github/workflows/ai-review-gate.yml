name: AI Review Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai-review-gate:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 의존성 설치
        run: npm ci

      # 공개 fork PR에는 저장소 secret이 전달되지 않으므로, 운영 적용 시 별도의 secret 처리 설계가 필요합니다.
      - name: AI Review Gate 실행
        id: ai_review
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3-flash-preview' }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: npm run ai-review:ci

      - name: 리포트 파일 보장
        if: always()
        run: |
          mkdir -p reports
          if [ ! -f reports/review-report.md ]; then
            {
              echo "# AI Review Gate 리포트"
              echo
              echo "AI Review Gate가 리포트를 생성하지 못했습니다. 워크플로 로그를 확인하세요."
              echo
              echo "---"
              echo
              echo "이 리포트는 보조 검토 자료이며, 최종 승인은 사람이 책임집니다."
            } > reports/review-report.md
          fi

      - name: 리뷰 리포트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-review-gate-reports
          path: reports/

      - name: PR에 리포트 코멘트 작성
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr comment "$PR_NUMBER" --body-file reports/review-report.md

      - name: 리뷰 명령 실패 시 워크플로 실패 처리
        if: steps.ai_review.outcome == 'failure'
        run: exit 1
